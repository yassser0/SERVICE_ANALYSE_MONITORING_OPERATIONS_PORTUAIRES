version: '3.9'

networks:
  port-iot-network:
    driver: bridge

volumes:
  postgres_data:
  data_lake:

services:
  # ─────────────────────────────────────────────
  # Zookeeper
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: port_zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - port-iot-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Apache Kafka
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: port_kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - port-iot-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # Kafka UI (Kafdrop)
  # ─────────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:3.31.0
    container_name: port_kafdrop
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    networks:
      - port-iot-network

  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: port_postgres
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-port_iot_db}
      POSTGRES_USER: ${POSTGRES_USER:-port_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-PortSecure2024!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - port-iot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-port_admin} -d ${POSTGRES_DB:-port_iot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # FastAPI Processing Service
  # ─────────────────────────────────────────────
  fastapi:
    build:
      context: ./services/processing
      dockerfile: Dockerfile
    container_name: port_fastapi
    hostname: fastapi
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=port-iot-data
      - POSTGRES_URL=postgresql+asyncpg://${POSTGRES_USER:-port_admin}:${POSTGRES_PASSWORD:-PortSecure2024!}@postgres:5432/${POSTGRES_DB:-port_iot_db}
      - DATA_LAKE_PATH=/data-lake
      - LOG_LEVEL=INFO
      - TEMP_HIGH_THRESHOLD=85.0
      - GPS_LAT_MIN=33.0
      - GPS_LAT_MAX=34.5
      - GPS_LON_MIN=-8.5
      - GPS_LON_MAX=-7.0
    volumes:
      - data_lake:/data-lake
    networks:
      - port-iot-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # IoT Simulator
  # ─────────────────────────────────────────────
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: port_simulator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=port-iot-data
      - EMIT_INTERVAL_SECONDS=3
      - NUM_SENSORS=20
      - LOG_LEVEL=INFO
    networks:
      - port-iot-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Grafana (Dashboard Ready)
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: port_grafana
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-grafana2024}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-worldmap-panel
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - port-iot-network
