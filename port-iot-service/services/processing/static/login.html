<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Port IoT — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1520;
      --surface2: #111d2e;
      --border: rgba(100, 200, 255, .10);
      --accent: #00b4ff;
      --accent2: #0066ff;
      --text: #e2eaf5;
      --muted: #6b8aad;
      --radius: 16px;
      --font: 'Inter', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 180, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 180, 255, .03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: rgba(13, 21, 32, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
      animation: slideUp 0.6s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: grid;
      place-items: center;
      font-size: 1.8rem;
      box-shadow: 0 8px 24px rgba(0, 102, 255, 0.3);
    }

    .logo h1 {
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--text), var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 180, 255, 0.15);
    }

    .error-msg {
      color: #ff3d57;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 20px;
      text-align: center;
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 102, 255, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.loading {
      opacity: 0.8;
      pointer-events: none;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="logo">
      <h1>Port IoT Access</h1>
    </div>
    <form id="login-form">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter admin username" required autofocus />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required />
      </div>

      <div class="error-msg" id="error-msg">Invalid credentials</div>

      <button type="submit" class="btn" id="login-btn">
        <span>Secure Login</span>
      </button>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');
      const btnText = btn.querySelector('span');

      err.style.opacity = '0';
      btn.classList.add('loading');
      btnText.style.display = 'none';

      if (!document.getElementById('spin')) {
        btn.insertAdjacentHTML('afterbegin', '<div class="spinner" id="spin"></div>');
      }

      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });

        if (r.ok) {
          window.location.href = '/';
        } else {
          err.style.opacity = '1';
          btn.classList.remove('loading');
          btnText.style.display = 'inline';
          const spin = document.getElementById('spin');
          if (spin) spin.remove();
        }
      } catch (e) {
        err.textContent = "Network error. Please try again.";
        err.style.opacity = '1';
        btn.classList.remove('loading');
        btnText.style.display = 'inline';
        const spin = document.getElementById('spin');
        if (spin) spin.remove();
      }
    });
  </script>

</body>

</html>
