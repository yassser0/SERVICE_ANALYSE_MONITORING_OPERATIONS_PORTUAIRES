<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Port IoT — Connexion Admin</title>
  <meta name="description" content="Accès sécurisé au panneau d'administration Port IoT" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #070b18;
      --bg-mid: #0a1025;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(99, 102, 241, 0.6);
      --accent-start: #6366f1;
      --accent-end: #8b5cf6;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --text: #f1f5f9;
      --text-sub: #94a3b8;
      --text-label: #cbd5e1;
      --error: #f43f5e;
      --radius: 14px;
      --font: 'Inter', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Galaxy / star background ── */
    #galaxy-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Ambient glow blobs ── */
    .glow-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .glow-blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6366f1, transparent 70%);
      top: -120px; left: -100px;
    }
    .glow-blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #8b5cf6, transparent 70%);
      bottom: -80px; right: -80px;
    }
    .glow-blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #3b82f6, transparent 70%);
      top: 50%; left: 60%;
      transform: translate(-50%, -50%);
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 40px 36px 36px;
      background: rgba(10, 16, 40, 0.72);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 64px rgba(0, 0, 0, 0.7),
        0 0 80px rgba(99, 102, 241, 0.08);
      animation: cardIn 0.7s cubic-bezier(.22,1,.36,1) forwards;
      opacity: 0;
      transform: translateY(28px) scale(0.97);
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Brand header ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .brand-text h1 {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .brand-text p {
      font-size: 0.78rem;
      color: var(--text-sub);
      font-weight: 400;
      margin-top: 2px;
    }

    /* ── Welcome heading ── */
    .welcome {
      margin-bottom: 28px;
    }

    .welcome h2 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .welcome p {
      font-size: 0.88rem;
      color: var(--text-sub);
      line-height: 1.5;
    }

    /* ── Form fields ── */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-label);
      margin-bottom: 8px;
    }

    .field-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-icon {
      position: absolute;
      left: 14px;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      pointer-events: none;
      transition: color 0.2s;
    }

    .field-wrap input {
      width: 100%;
      padding: 13px 44px 13px 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field-wrap input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    .field-wrap input:focus {
      border-color: var(--border-focus);
      background: var(--surface-hover);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .field-wrap input:focus ~ .field-icon,
    .field-wrap:focus-within .field-icon {
      color: var(--accent-start);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      background: none;
      border: none;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-pw:hover {
      color: var(--text);
    }

    /* ── Error ── */
    .error-msg {
      color: var(--error);
      font-size: 0.82rem;
      font-weight: 500;
      text-align: center;
      min-height: 18px;
      margin-bottom: 18px;
      opacity: 0;
      transition: opacity 0.25s;
    }

    /* ── Login button ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
      letter-spacing: 0.01em;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.5);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login.loading {
      opacity: 0.75;
      pointer-events: none;
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer note ── */
    .footer-note {
      margin-top: 22px;
      text-align: center;
      font-size: 0.77rem;
      color: rgba(148, 163, 184, 0.45);
    }
  </style>
</head>

<body>

  <!-- Animated starfield -->
  <canvas id="galaxy-canvas"></canvas>

  <!-- Ambient glow -->
  <div class="glow-blob glow-blob-1"></div>
  <div class="glow-blob glow-blob-2"></div>
  <div class="glow-blob glow-blob-3"></div>

  <!-- Login card -->
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">⚓</div>
      <div class="brand-text">
        <h1>Port IoT</h1>
        <p>Panneau d'administration</p>
      </div>
    </div>

    <!-- Welcome -->
    <div class="welcome">
      <h2>Bienvenue 👋</h2>
      <p>Connectez-vous pour accéder à votre espace administrateur.</p>
    </div>

    <!-- Form -->
    <form id="login-form" novalidate>

      <div class="field">
        <label for="username">Identifiant</label>
        <div class="field-wrap">
          <!-- person icon -->
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text" id="username" name="username" placeholder="admin" required autofocus autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="field-wrap">
          <!-- lock icon -->
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
          <!-- toggle visibility -->
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Afficher/masquer le mot de passe">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-msg" id="error-msg">Identifiants invalides</div>

      <button type="submit" class="btn-login" id="login-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="btn-icon">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span id="btn-text">Se connecter</span>
      </button>

    </form>

    <p class="footer-note">Accès réservé au personnel autorisé de Port IoT.</p>
  </div>

  <script>
    /* ── Starfield canvas ── */
    (function () {
      const canvas = document.getElementById('galaxy-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, stars = [];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function initStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.2 + 0.2,
            alpha: Math.random() * 0.6 + 0.2,
            speed: Math.random() * 0.015 + 0.005,
            phase: Math.random() * Math.PI * 2
          });
        }
      }

      function draw(ts) {
        ctx.clearRect(0, 0, W, H);
        for (const s of stars) {
          const a = s.alpha * (0.7 + 0.3 * Math.sin(ts * s.speed + s.phase));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200, 210, 255, ${a})`;
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); initStars(220); });
      resize();
      initStars(220);
      requestAnimationFrame(draw);
    })();

    /* ── Password toggle ── */
    document.getElementById('toggle-pw').addEventListener('click', function () {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        pw.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    });

    /* ── Login form ── */
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('btn-text');
      const btnIcon = document.getElementById('btn-icon');
      const err = document.getElementById('error-msg');

      err.style.opacity = '0';
      btn.classList.add('loading');
      btnText.textContent = 'Connexion…';
      btnIcon.style.display = 'none';

      if (!document.getElementById('spin')) {
        btn.insertAdjacentHTML('afterbegin', '<div class="spinner" id="spin"></div>');
      }

      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });

        if (r.ok) {
          window.location.href = '/';
        } else {
          err.textContent = 'Identifiants invalides. Veuillez réessayer.';
          err.style.opacity = '1';
          btn.classList.remove('loading');
          btnText.textContent = 'Se connecter';
          btnIcon.style.display = '';
          const spin = document.getElementById('spin');
          if (spin) spin.remove();
        }
      } catch (_) {
        err.textContent = 'Erreur réseau. Veuillez réessayer.';
        err.style.opacity = '1';
        btn.classList.remove('loading');
        btnText.textContent = 'Se connecter';
        btnIcon.style.display = '';
        const spin = document.getElementById('spin');
        if (spin) spin.remove();
      }
    });
  </script>

</body>
</html>
